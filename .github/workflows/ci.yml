name: CI

# Every push is fully gated and master auto-deploys the site — so the served
# llms.txt / llms-full.txt (and the rest of the docs site) can never lag the
# docs in the repo. The llms drift guard runs twice: inside vitest
# (tests/llms-txt.test.ts) and again via prebuild during the site build.

on:
  push:
    branches: [master]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npx vitest run
      # Build the package artifacts on the clean checkout: validates the
      # declaration emit AND provides dist-lib/standalone.js for the CDN spec.
      - run: npm run build:pkg
      - run: npx playwright install --with-deps chromium
      - run: npx playwright test
      - name: Upload Playwright traces on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-traces
          path: test-results/
          retention-days: 7

  deploy-site:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      # prebuild regenerates public/llms*.txt from docs/ (fails on drift).
      - run: npm run build
      - name: Deploy to gh-pages
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          force_orphan: true
